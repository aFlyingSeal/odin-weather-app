<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <div class="main-container">
        <div class="input-container">
            <input id="city-input" type="text">
            <button id="submit-btn">Enter</button>
        </div>

        <div class="display-container">
            <div class="weather-container">
                <p class="display-emoji"></p>
                <p class="display-overall"></p>
                <p class="display-temp"></p>
                <p class="display-feels"></p>
                <p class="display-wind"></p>
                <p class="display-humid"></p>
            </div>

            <div class="forecast-container">

            </div>
        </div>
    </div>
</body>
</html>
